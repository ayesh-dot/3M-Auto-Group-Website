    <script src="main.js"></script>
<script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithPopup, 
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, limit, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7P5QVOAH-xBY2tGWTSApoQaU8dRSfCvA",
            authDomain: "mmm-auto-group-test.firebaseapp.com",
            projectId: "mmm-auto-group-test",
            storageBucket: "mmm-auto-group-test.firebasestorage.app",
            messagingSenderId: "521394611759",
            appId: "1:521394611759:web:1dae13828195b00748c8da"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        // 1. SIGN IN (Popup Method)
        window.handleGoogleSignIn = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                console.log("Success! Logged in as:", result.user.displayName);
            } catch (error) {
                console.error("Popup Auth Error:", error.message);
                alert("Login failed. Check your internet or if the popup was blocked.");
            }
        };

        // 2. SIGN OUT
        window.handleSignOut = () => {
            signOut(auth).then(() => {
                console.log("Signed out.");
            }).catch((error) => {
                console.error("Sign out error:", error);
            });
        };

        // 3. THE OBSERVER (The Brain)
        onAuthStateChanged(auth, (user) => {
            const loginBtn = document.getElementById('signInButton');
            const signOutBtn = document.getElementById('signOutButton');
            const listingsBtn = document.getElementById('listingsMenuButton');

            if (user) {
                console.log("User detected by Observer:", user.displayName);
                
                // Switch Sign In for Sign Out
                if (loginBtn) loginBtn.style.background = "#4CAF50";
                if (loginBtn) loginBtn.innerHTML = "Welcome, " + user.displayName + "👋";
                if (signOutBtn) signOutBtn.style.display = "block";

                // Role-based button (Case Insensitive)
                if (user.uid === "NYtvLyGUvhSfFtr0UpukSBwHGYr1") {
                    if (listingsBtn) listingsBtn.style.display = "block";
                }

            } else {
                console.log("No user session active.");
                
                // Switch Sign Out for Sign In
                if (loginBtn) {
                    loginBtn.style.display = "block";
                    if (loginBtn) loginBtn.style.background = "";
                    loginBtn.innerHTML = "Sign In 🌐";
                }
                if (signOutBtn) signOutBtn.style.display = "none";
                if (listingsBtn) listingsBtn.style.display = "none";
            }
        });


        async function getRecentCars() {
        const carsRef = collection(db, "cars");

        // 1. Create the query: Order by 'timestamp' descending, stop after 5
       const recentQuery = query(
    carsRef, 
    limit(5)
);

        try {
            const querySnapshot = await getDocs(recentQuery);
            
            // Clear your "Recent Activity" list before filling it
            const listContainer = document.getElementById('recentActivityList');
            listContainer.innerHTML = ""; 

            querySnapshot.forEach((doc) => {
                const car = doc.id;
                const data = doc.data();

                console.log(data);
                
                // 2. Render each car into your "Recent Activity" 80% space
                renderRecentItem(car, data);
            });
        } catch (error) {
            console.error("Error fetching recent cars:", error);
        }
    }

    function renderRecentItem(id, data) {
    const listContainer = document.getElementById('recentActivityList');
    
    // This creates a simple visual for each car
    const html = `
                <a href="pages/listings.html" style="text-decoration: none; color: inherit;">
                    <div class="grid-dashboard, indexCard">
                        <img src="${data.image}" alt="${data.make}" style="width: 300px;">
                        <h3>${data.make} ${data.model} ${data.year}</h3>
                        <p class="card-price">$${Number(data.price).toLocaleString()}</p>

                        <div class="specs-grid">
                            <span>🛣️ ${data.mileage} mi</span>
                            <span>⚙️ ${data.transmission}</span>
                            <span>⛽ ${data.fuelType}</span>
                            <span>🚗 ${data.drivetrain}</span>
                        </div>
                    </div>
                </a>
    `;
    listContainer.insertAdjacentHTML('beforeend', html);
    }
    
    getRecentCars();

    </script>
